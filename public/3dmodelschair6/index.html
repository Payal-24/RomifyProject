<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Almirah - AR View</title>

  <!-- Google Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px 0 10px;
    }

    model-viewer {
      width: 100%;
      height: 80vh;
    }
  </style>
</head>
<body>

<h1>Modern Wooden Almirah</h1>

<model-viewer
  src="vintage_turquoise_cabinet.glb"
  alt="Modern Almirah"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  exposure="1"
  style="background-color:#ffffff;">
</model-viewer>

</body>
</html>
