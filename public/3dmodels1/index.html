<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modern Almirah</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    model-viewer {
      width: 100%;
      height: 500px;
      background: #fff;
      border-radius: 12px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Modern 2-Door Almirah</h1>
  <p>Height: 6ft | Width: 1m | Depth: 0.5m</p>

  <model-viewer
    id="viewer"
    src="almirah_model.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>

  <button class="btn" onclick="openAR()">View in Your Room</button>
</div>

<script>
  function openAR() {
    const viewer = document.getElementById('viewer');
    viewer.activateAR();
  }
</script>

</body>
</html>
